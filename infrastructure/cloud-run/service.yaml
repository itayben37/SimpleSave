apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: simplesave-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: "PROJECT_ID:REGION:simplesave-db"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      containers:
        - image: gcr.io/PROJECT_ID/simplesave-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: simplesave-db-url
                  key: latest
            - name: FIREBASE_CREDENTIALS_PATH
              value: /secrets/firebase-credentials.json
            - name: ENVIRONMENT
              value: production
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
